<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리마크 별빛독서실</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=block" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --amber:#f5c969; --blue:#5aa9e6; --calm:#5fc9a8;
    --accent:var(--amber);
  }
  html,body{height:100%;}
  body{
    font-family:"Pretendard","Noto Sans KR",sans-serif;
    -webkit-font-smoothing:antialiased;
    color:#fff; overflow:hidden;
    background:
      radial-gradient(120% 90% at 82% 8%, rgba(245,201,105,.14) 0%, rgba(245,201,105,0) 46%),
      radial-gradient(110% 120% at 10% 112%, rgba(46,117,182,.30) 0%, rgba(46,117,182,0) 55%),
      linear-gradient(150deg,#0c1a2e 0%,#11243d 55%,#0a1626 100%);
    transition:background .6s ease;
  }
  body.break{
    background:
      radial-gradient(120% 90% at 82% 8%, rgba(95,201,168,.14) 0%, rgba(95,201,168,0) 46%),
      radial-gradient(110% 120% at 10% 112%, rgba(46,117,182,.26) 0%, rgba(46,117,182,0) 55%),
      linear-gradient(150deg,#0b1f24 0%,#0f2a2e 55%,#081a1c 100%);
  }
  /* 별 */
  .star{position:fixed;background:#fff;border-radius:50%;opacity:.4;}
  .s1{top:8%;left:14%;width:3px;height:3px;}
  .s2{top:13%;left:34%;width:2px;height:2px;opacity:.3;}
  .s3{top:22%;left:80%;width:2px;height:2px;opacity:.35;}
  .s4{top:10%;left:66%;width:2px;height:2px;opacity:.3;}
  .s5{top:30%;left:22%;width:2px;height:2px;opacity:.25;}

  .wrap{height:100%;display:flex;flex-direction:column;padding:34px 48px 26px;position:relative;}

  /* 상단바 */
  .top{display:flex;align-items:center;justify-content:space-between;}
  .brand{font-size:20px;font-weight:800;letter-spacing:.01em;}
  .brand small{font-size:11px;font-weight:600;letter-spacing:.22em;color:#7f97b5;margin-left:8px;}
  .clock{font-size:20px;font-weight:600;color:#c8d6e8;font-variant-numeric:tabular-nums;}

  /* 중앙 */
  .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .phase{
    font-size:24px;font-weight:700;letter-spacing:.04em;
    color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:12px;
  }
  .phase .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 16px 3px var(--accent);}
  .session{font-size:15px;font-weight:500;color:#90a6c2;letter-spacing:.05em;margin-bottom:14px;}
  .timer{
    font-size:188px;font-weight:800;line-height:.95;letter-spacing:-.03em;
    font-variant-numeric:tabular-nums;
    text-shadow:0 0 60px rgba(245,201,105,.18);
  }
  .msg{
    margin-top:26px;max-width:900px;text-align:center;
    font-size:27px;font-weight:600;line-height:1.4;color:#eaf1fa;
    border:1px dashed transparent;border-radius:14px;padding:10px 22px;outline:none;
    transition:border-color .2s,background .2s;cursor:text;
  }
  .msg:hover{border-color:rgba(255,255,255,.18);}
  .msg:focus{border-color:var(--accent);background:rgba(255,255,255,.04);}
  .msg:empty:before{content:attr(data-ph);color:#5d738f;}

  /* 하단 규칙 + 컨트롤 */
  .bottom{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;}
  .rules{font-size:15px;font-weight:500;color:#90a6c2;letter-spacing:.01em;line-height:1.6;}
  .rules b{color:#dde8f5;font-weight:700;}
  .controls{display:flex;gap:10px;align-items:center;}
  button.ctl{
    font-family:inherit;font-size:14px;font-weight:600;color:#cfe0f2;
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);
    border-radius:999px;padding:9px 18px;cursor:pointer;transition:.15s;
  }
  button.ctl:hover{background:rgba(255,255,255,.14);color:#fff;}
  button.primary{background:var(--accent);color:#0c1a2e;border-color:var(--accent);}
  button.primary:hover{filter:brightness(1.08);background:var(--accent);color:#0c1a2e;}
  .setbox{display:flex;gap:6px;align-items:center;font-size:13px;color:#90a6c2;}
  .setbox input{
    width:46px;font-family:inherit;font-size:14px;text-align:center;color:#fff;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:6px 4px;
  }

  /* 밤 세션 진행바 (22:00→24:00) */
  .nightbar{position:fixed;left:0;bottom:0;height:4px;width:100%;background:rgba(255,255,255,.06);}
  .nightbar .fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),rgba(255,255,255,.4));transition:width 1s linear;}

  .hint{position:fixed;top:14px;left:50%;transform:translateX(-50%);font-size:12px;color:#5d738f;letter-spacing:.02em;}

  /* 단계전환 플래시 */
  .flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;}
  .flash.go{animation:fl .7s ease;}
  @keyframes fl{0%{opacity:.0;}25%{opacity:.22;}100%{opacity:0;}}

  /* 모바일 대응 */
  @media (max-width:680px){
    .wrap{padding:18px 16px 14px;}
    .brand{font-size:15px;}
    .brand small{display:none;}
    .clock{font-size:15px;}
    .phase{font-size:17px;gap:9px;}
    .phase .dot{width:9px;height:9px;}
    .session{font-size:12px;margin-bottom:8px;}
    .timer{font-size:clamp(74px,27vw,120px);}
    .msg{font-size:17px;margin-top:16px;padding:8px 12px;max-width:92vw;}
    .bottom{flex-direction:column;align-items:stretch;gap:12px;}
    .rules{font-size:12px;order:2;text-align:center;line-height:1.5;}
    .controls{order:1;flex-wrap:wrap;justify-content:center;gap:8px;}
    button.ctl{font-size:13px;padding:8px 14px;}
    .setbox{font-size:12px;}
    .hint{display:none;}
  }
</style>
</head>
<body>
  <span class="star s1"></span><span class="star s2"></span><span class="star s3"></span>
  <span class="star s4"></span><span class="star s5"></span>
  <div class="flash" id="flash"></div>
  <div class="hint">Space 시작/멈춤 · N 다음단계 · R 리셋 · F 전체화면</div>

  <div class="wrap">
    <div class="top">
      <div class="brand">리마크 별빛독서실<small>REMARK</small></div>
      <div class="clock" id="clock">--:--</div>
    </div>

    <div class="center">
      <div class="phase"><span class="dot"></span><span id="phaseLabel">집중</span></div>
      <div class="session" id="session">1교시 · 시작 버튼을 누르세요</div>
      <div class="timer" id="timer">50:00</div>
      <div class="msg" id="msg" contenteditable="true" spellcheck="false"
           data-ph="여기를 눌러 오늘의 한마디를 입력하세요"></div>
    </div>

    <div class="bottom">
      <div class="rules">
        <b>카메라 ON</b> · 무슨 공부를 하든 OK · 매일 밤 <b>10:00 ~ 12:00</b><br>
        같이 앉아 끝까지 가는 게 핵심. 부담 말고 그냥 하자.
      </div>
      <div class="controls">
        <button class="ctl primary" id="modeBtn">시계 자동</button>
        <div class="setbox">집중<input id="focusMin" type="number" min="1" max="120" value="50">분</div>
        <div class="setbox">휴식<input id="breakMin" type="number" min="1" max="60" value="10">분</div>
        <button class="ctl" id="resetBtn">리셋</button>
        <button class="ctl" id="nextBtn">다음 단계</button>
        <button class="ctl" id="startBtn">시작</button>
      </div>
    </div>
  </div>
  <div class="nightbar"><div class="fill" id="nightFill"></div></div>

<script>
(function(){
  const $=id=>document.getElementById(id);
  const timerEl=$('timer'), phaseEl=$('phaseLabel'), sessEl=$('session'),
        startBtn=$('startBtn'), nextBtn=$('nextBtn'), resetBtn=$('resetBtn'),
        modeBtn=$('modeBtn'),
        focusInput=$('focusMin'), breakInput=$('breakMin'), msgEl=$('msg'),
        clockEl=$('clock'), nightFill=$('nightFill'), flash=$('flash');

  const START_H=22;            // 밤 10시 자동 시작
  const END_H=24;              // 자정 종료
  let mode='auto';            // 'auto'(시계 연동) | 'manual'
  let phase='focus';
  let session=1;
  let remaining=50*60;
  let running=false;          // manual 모드에서만 사용
  let lastPhase=null;         // auto 전환 감지용

  function focusSec(){return Math.max(1,parseInt(focusInput.value)||50)*60;}
  function breakSec(){return Math.max(1,parseInt(breakInput.value)||10)*60;}
  function nowSec(){const d=new Date();return d.getHours()*3600+d.getMinutes()*60+d.getSeconds();}
  function fmt(sec){
    sec=Math.max(0,sec);
    const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
    if(h>0)return h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  }

  function setAccent(kind){
    if(kind==='focus'){document.body.classList.remove('break');document.documentElement.style.setProperty('--accent','var(--amber)');}
    else if(kind==='break'){document.body.classList.add('break');document.documentElement.style.setProperty('--accent','var(--calm)');}
    else{document.body.classList.remove('break');document.documentElement.style.setProperty('--accent','var(--blue)');}
  }

  function doFlash(freq){flash.classList.remove('go');void flash.offsetWidth;flash.classList.add('go');beep(freq);}
  function beep(freq){
    try{
      const ac=new (window.AudioContext||window.webkitAudioContext)();
      const o=ac.createOscillator(), g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.type='sine';o.frequency.value=freq||600;
      g.gain.setValueAtTime(0.0001,ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.25,ac.currentTime+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+0.6);
      o.start();o.stop(ac.currentTime+0.62);
    }catch(e){}
  }

  // ── 시계 연동(자동) 계산 ──
  function computeAuto(){
    const startSec=START_H*3600, endSec=END_H*3600, cur=nowSec();
    if(cur<startSec) return {state:'pre', remaining:startSec-cur};
    if(cur>=endSec)  return {state:'post'};
    const focus=focusSec(), brk=breakSec(), cycle=focus+brk;
    const since=cur-startSec, pos=since%cycle, cyc=Math.floor(since/cycle);
    if(pos<focus) return {state:'run',phase:'focus',remaining:focus-pos,session:cyc+1};
    return {state:'run',phase:'break',remaining:cycle-pos,session:cyc+1};
  }

  function renderAuto(){
    const a=computeAuto();
    if(a.state==='pre'){
      setAccent('idle');phaseEl.textContent='곧 시작';
      sessEl.textContent='밤 10시에 자동으로 시작합니다';
      timerEl.textContent=fmt(a.remaining);
      document.title='시작까지 '+fmt(a.remaining)+' · 별빛독서실';
      lastPhase=null;return;
    }
    if(a.state==='post'){
      setAccent('idle');phaseEl.textContent='오늘 종료';
      sessEl.textContent='수고했어요. 내일 밤 10시에 또 만나요';
      timerEl.textContent='00:00';
      document.title='오늘 별빛독서실 종료';
      lastPhase=null;return;
    }
    // 진행 중
    if(lastPhase && lastPhase!==a.phase) doFlash(a.phase==='focus'?660:520);
    lastPhase=a.phase;
    setAccent(a.phase);
    phaseEl.textContent=a.phase==='focus'?'집중':'휴식';
    sessEl.textContent=a.phase==='focus'?(a.session+'교시 진행 중'):(a.session+'교시 후 쉬는 시간');
    timerEl.textContent=fmt(a.remaining);
    document.title=(a.phase==='focus'?'[집중] ':'[휴식] ')+fmt(a.remaining)+' · 별빛독서실';
  }

  // ── 수동 모드 ──
  function renderManual(){
    setAccent(phase);
    timerEl.textContent=fmt(remaining);
    phaseEl.textContent=phase==='focus'?'집중':'휴식';
    sessEl.textContent=(phase==='focus'?session+'교시':session+'교시 후 쉬는 시간')+(running?' 진행 중':' · 대기');
    document.title=(phase==='focus'?'[집중] ':'[휴식] ')+fmt(remaining)+' · 별빛독서실';
  }
  function manualSwitch(){
    if(phase==='focus'){phase='break';remaining=breakSec();doFlash(520);}
    else{phase='focus';session+=1;remaining=focusSec();doFlash(660);}
    renderManual();
  }

  // ── 1초 틱 (공통) ──
  setInterval(()=>{
    // 시계 + 밤 진행바
    const d=new Date();
    clockEl.textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    let p=(nowSec()-START_H*3600)/((END_H-START_H)*3600);p=Math.max(0,Math.min(1,p));
    nightFill.style.width=(p*100)+'%';

    if(mode==='auto'){ renderAuto(); }
    else if(running){
      remaining--;
      if(remaining<0){manualSwitch();return;}
      renderManual();
    }
  },1000);

  // ── 모드 토글 ──
  function applyMode(){
    if(mode==='auto'){
      modeBtn.textContent='시계 자동';modeBtn.classList.add('primary');
      [startBtn,nextBtn,resetBtn].forEach(b=>{b.disabled=true;b.style.opacity=.4;b.style.pointerEvents='none';});
      renderAuto();
    }else{
      modeBtn.textContent='수동';modeBtn.classList.remove('primary');
      [startBtn,nextBtn,resetBtn].forEach(b=>{b.disabled=false;b.style.opacity=1;b.style.pointerEvents='auto';});
      renderManual();
    }
  }
  modeBtn.onclick=()=>{mode=(mode==='auto')?'manual':'auto';applyMode();};

  // 수동 버튼
  startBtn.onclick=()=>{
    if(mode!=='manual')return;
    running=!running;
    startBtn.textContent=running?'일시정지':'계속';
    startBtn.classList.toggle('primary',!running);
    renderManual();
  };
  nextBtn.onclick=()=>{if(mode==='manual')manualSwitch();};
  resetBtn.onclick=()=>{
    if(mode!=='manual')return;
    running=false;phase='focus';session=1;remaining=focusSec();
    startBtn.textContent='시작';startBtn.classList.remove('primary');renderManual();
  };
  focusInput.onchange=()=>{if(mode==='manual'&&phase==='focus'&&!running){remaining=focusSec();renderManual();}};
  breakInput.onchange=()=>{if(mode==='manual'&&phase==='break'&&!running){remaining=breakSec();renderManual();}};

  // 오늘의 한마디 저장/복원 (비어있으면 기본 문구)
  const KEY='remark_studyroom_msg';
  const DEFAULT_MSG='오늘도 끝까지. 딴 거 없다, 그냥 앉아서 하는 거다.';
  msgEl.textContent=localStorage.getItem(KEY)||DEFAULT_MSG;
  msgEl.addEventListener('input',()=>localStorage.setItem(KEY,msgEl.textContent));

  // 단축키
  document.addEventListener('keydown',e=>{
    if(e.target===msgEl)return;
    if(e.key==='m'||e.key==='M'){modeBtn.click();}
    else if(e.key==='f'||e.key==='F'){
      if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();
    }
    else if(mode==='manual'){
      if(e.code==='Space'){e.preventDefault();startBtn.click();}
      else if(e.key==='n'||e.key==='N'){nextBtn.click();}
      else if(e.key==='r'||e.key==='R'){resetBtn.click();}
    }
  });

  applyMode();
})();
</script>
</body>
</html>
